<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bốc Thăm An Viet Homes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Manrope', sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #000; }

        .scroll-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
        }

        #section1 { background-color: #0d47a1; }
        #section2, #section3 { background-color: #0277bd; }

        /* ĐIỀU CHỈNH KHOẢNG CÁCH DỌC LINH HOẠT */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Dùng center để tự động cân bằng */
            flex: 1;
            width: 100%;
            padding-top: 10vh; 
            padding-bottom: 120px; /* Chừa chỗ cho nút Bốc Thăm ở dưới */
        }

        .section-title {
            color: #fff;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 25px;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .match-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px 35px;
            width: 100%;
            max-width: 1010px; 
        }

        .matchup-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px;
            border-radius: 12px;
            background: rgba(0, 90, 140, 0.15);
            border: 2px solid rgba(0, 229, 255, 0.35);
            backdrop-filter: blur(5px);
        }
        
        .matchup-label { color: #fff; font-size: 12px; font-weight: 700; margin-bottom: 8px; }
        .matchup-boxes { display: flex; align-items: center; gap: 15px; }
        
        .team-box {
            background: #fff;
            border-radius: 8px;
            width: 160px;
            height: 65px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 5px;
        }
        
        .team-box .team-name { font-weight: 800; font-size: 14px; color: #111; }
        .team-box .team-members { font-size: 10px; color: #444; font-weight: 600; }
        .vs-text { color: #00e5ff; font-weight: 800; font-size: 16px; }

        .btn-draw {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #00e5ff, #00b4d8);
            border: none;
            padding: 12px 60px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="scroll-container">
    <section id="section1"></section>

    <section id="section2">
        <div class="content-wrapper">
            <div class="section-title">GIẢI BILLIARD - ĐẤU ĐÔI</div>
            <div class="match-grid" id="billiard-grid"></div>
        </div>
        <button class="btn-draw" onclick="drawMatch('billiard')">BỐC THĂM</button>
    </section>

    <section id="section3">
        <div class="content-wrapper">
            <div class="section-title">GIẢI PICKLEBALL - ĐÔI NAM NỮ</div>
            <div class="match-grid" id="pickleball-grid"></div>
        </div>
        <button class="btn-draw" onclick="drawMatch('pickleball')">BỐC THĂM</button>
    </section>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQ911fuDdhC4Eur8tz1XG48o6-8L4C39EUgQt26SHOEkQwLqF4X0Ps0Sf4ChXfc_dh/exec"; 

    let dataPool = { billiard: [], pickleball: [] };
    let currentMatchIndex = { billiard: 1, pickleball: 1 };
    const maxMatches = { billiard: 5, pickleball: 4 };

    function initGrid(type, count) {
        const grid = document.getElementById(`${type}-grid`);
        let html = '';
        for(let i = 1; i <= count; i++) {
            html += `
            <div class="matchup-wrapper">
                <div class="matchup-label">CẶP ĐẤU SỐ ${i}</div>
                <div class="matchup-boxes">
                    <div class="team-box" id="${type}-match-${i}-team1">
                        <div class="team-name" style="color:#777;">ĐỘI...</div>
                    </div>
                    <div class="vs-text">VS</div>
                    <div class="team-box" id="${type}-match-${i}-team2">
                        <div class="team-name" style="color:#777;">ĐỘI...</div>
                    </div>
                </div>
            </div>`;
        }
        grid.innerHTML = html;
    }

    initGrid('billiard', 5);
    initGrid('pickleball', 4);

    async function fetchData(sheetName, type) {
        try {
            let res = await fetch(SCRIPT_URL + "?sheet=" + sheetName);
            dataPool[type] = await res.json();
        } catch (err) { console.error(err); }
    }
    
    fetchData("Billiard", "billiard");
    fetchData("Pickleball", "pickleball");

    function drawMatch(type) {
        let matchIdx = currentMatchIndex[type];
        if (matchIdx > maxMatches[type]) return;

        let box1 = document.getElementById(`${type}-match-${matchIdx}-team1`);
        let box2 = document.getElementById(`${type}-match-${matchIdx}-team2`);
        
        let t1 = dataPool[type].splice(Math.floor(Math.random() * dataPool[type].length), 1)[0];
        let t2 = dataPool[type].splice(Math.floor(Math.random() * dataPool[type].length), 1)[0];

        box1.innerHTML = `<div class="team-name">${t1['Nhóm số']}</div><div class="team-members">${t1['Thành viên']}</div>`;
        box2.innerHTML = `<div class="team-name">${t2['Nhóm số']}</div><div class="team-members">${t2['Thành viên']}</div>`;
        currentMatchIndex[type]++;
    }
</script>
</body>
</html>
