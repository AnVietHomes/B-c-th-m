<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bốc Thăm An Viet Homes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* RESET & FONT MANROPE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Manrope', sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #000; }

        /* SCROLL SNAP & ẨN THANH CUỘN */
        .scroll-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            /* Ẩn thanh cuộn trên Firefox */
            scrollbar-width: none; 
            /* Ẩn thanh cuộn trên IE/Edge */
            -ms-overflow-style: none; 
        }
        /* Ẩn thanh cuộn trên Chrome/Safari/Opera */
        .scroll-container::-webkit-scrollbar {
            display: none; 
        }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
        }

        #section1 { background-image: url('back1.png'); background-color: #0d47a1; }
        #section2, #section3 { background-image: url('back2.png'); background-color: #0277bd; }

        /* KHỐI BỌC NỘI DUNG ĐỂ CĂN GIỮA MÀN HÌNH */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Căn giữa theo chiều dọc */
            flex: 1; /* Chiếm toàn bộ khoảng trống */
            width: 100%;
            padding-top: 10vh; /* Đẩy lùi xuống để tránh đè vào 3 logo ở nền */
            padding-bottom: 120px; /* Chừa khoảng trống cho nút bốc thăm ở dưới */
        }

        /* TIÊU ĐỀ SECTION */
        .section-title {
            color: #fff;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        /* LƯỚI CẶP ĐẤU */
        .match-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px 40px;
            width: 95%;
            max-width: 1300px;
        }

        /* Ô CẶP ĐẤU (Styling giống ảnh 1 của bạn) */
        .matchup-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            padding: 15px 20px;
            border-radius: 12px;
            /* Tạo viền sáng và nền trong suốt giống ảnh 1 */
            background: rgba(0, 100, 150, 0.2);
            border: 2px solid rgba(0, 229, 255, 0.3);
            box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.1), 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }
        
        .matchup-label {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        
        .matchup-boxes {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .team-box {
            background: #fff;
            border-radius: 8px;
            width: 170px;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            padding: 5px;
        }
        
        .team-box .team-name { font-weight: 800; font-size: 16px; color: #333; margin-bottom: 5px;}
        .team-box .team-members { font-size: 11px; color: #555; line-height: 1.3; font-weight: 600;}
        .vs-text { color: #00e5ff; font-weight: 800; font-size: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);}

        /* NÚT BỐC THĂM */
        .btn-draw {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #00e5ff, #00b4d8);
            border: none;
            padding: 15px 60px;
            font-size: 20px;
            font-weight: 800;
            color: #000;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 229, 255, 0.5);
            transition: all 0.2s;
            font-family: 'Manrope', sans-serif;
        }
        .btn-draw:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 229, 255, 0.7);
        }
        .btn-draw:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: translateX(-50%);}

        /* HIỆU ỨNG LÓE SÁNG KHI CHỐT KẾT QUẢ */
        @keyframes flashWinner {
            0% { box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.1); transform: scale(1); border-color: rgba(0, 229, 255, 0.3);}
            50% { box-shadow: 0 0 50px #00e5ff, inset 0 0 30px #00e5ff; transform: scale(1.05); border-color: #00e5ff; background: rgba(0, 229, 255, 0.3);}
            100% { box-shadow: 0 0 20px rgba(0, 229, 255, 0.6), inset 0 0 20px rgba(0, 229, 255, 0.2); transform: scale(1); border-color: #00e5ff;}
        }
        .highlight-match {
            animation: flashWinner 1.5s ease-out forwards;
        }

    </style>
</head>
<body>

<div class="scroll-container">
    <section id="section1">
    </section>

    <section id="section2">
        <div class="content-wrapper">
            <div class="section-title">GIẢI BILLIARD - ĐẤU ĐÔI</div>
            <div class="match-grid" id="billiard-grid">
                </div>
        </div>
        <button class="btn-draw" onclick="drawMatch('billiard')">BỐC THĂM</button>
    </section>

    <section id="section3">
        <div class="content-wrapper">
            <div class="section-title">GIẢI PICKLEBALL - ĐÔI NAM NỮ</div>
            <div class="match-grid" id="pickleball-grid">
                </div>
        </div>
        <button class="btn-draw" onclick="drawMatch('pickleball')">BỐC THĂM</button>
    </section>
</div>

<script>
    // URL Web App của Google Apps Script
    const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE"; 

    let dataPool = { billiard: [], pickleball: [] };
    let currentMatchIndex = { billiard: 1, pickleball: 1 };
    const maxMatches = { billiard: 5, pickleball: 4 };

    // Sinh giao diện
    function initGrid(type, count) {
        const grid = document.getElementById(`${type}-grid`);
        let html = '';
        for(let i = 1; i <= count; i++) {
            html += `
            <div class="matchup-wrapper" id="${type}-match-${i}">
                <div class="matchup-label">CẶP ĐẤU SỐ ${i}</div>
                <div class="matchup-boxes">
                    <div class="team-box" id="${type}-match-${i}-team1">
                        <div class="team-name">ĐỘI...</div>
                        <div class="team-members">Thành viên 1<br>Thành viên 2</div>
                    </div>
                    <div class="vs-text">VS</div>
                    <div class="team-box" id="${type}-match-${i}-team2">
                        <div class="team-name">ĐỘI...</div>
                        <div class="team-members">Thành viên 1<br>Thành viên 2</div>
                    </div>
                </div>
            </div>`;
        }
        grid.innerHTML = html;
    }

    initGrid('billiard', maxMatches.billiard);
    initGrid('pickleball', maxMatches.pickleball);

    // Mock Data chuẩn theo format ghép từ Backend (Để bạn test giao diện)
    function loadMockData() {
        for(let i = 1; i <= 20; i++) {
            dataPool.billiard.push({ 'Nhóm số': `ĐỘI ${i}`, 'Thành viên': `Nguyễn Thành Đạt - AV11<br>Nguyễn Tiến Hùng - AV11` });
            dataPool.pickleball.push({ 'Nhóm số': `ĐỘI ${i}`, 'Thành viên': `Lê Văn C${i} - AV1<br>Phạm Thị D${i} - AV2` });
        }
    }
    loadMockData(); // XÓA dòng này khi nối API thật

    // HÀM GỌI API THỰC TẾ (Bỏ comment để dùng thật)
    /*
    async function fetchData(sheetName, type) {
        try {
            let res = await fetch(SCRIPT_URL + "?sheet=" + sheetName);
            let data = await res.json();
            dataPool[type] = data;
        } catch (err) {
            console.error("Lỗi tải dữ liệu", err);
        }
    }
    fetchData("Billiard", "billiard");
    fetchData("Pickleball", "pickleball");
    */

    let isDrawing = false;

    // Hàm bốc thăm
    function drawMatch(type) {
        if (isDrawing) return;
        
        let matchIdx = currentMatchIndex[type];
        if (matchIdx > maxMatches[type]) {
            alert("Đã bốc thăm hết các cặp đấu trong danh sách!");
            return;
        }
        if (dataPool[type].length < 2) {
            alert("Không đủ số lượng đội trong danh sách để tạo cặp đấu!");
            return;
        }

        isDrawing = true;
        let targetWrapper = document.getElementById(`${type}-match-${matchIdx}`);
        let box1 = document.getElementById(`${type}-match-${matchIdx}-team1`);
        let box2 = document.getElementById(`${type}-match-${matchIdx}-team2`);

        let spinCount = 0;
        let maxSpins = 20; 
        
        let spinInterval = setInterval(() => {
            let randomT1 = dataPool[type][Math.floor(Math.random() * dataPool[type].length)];
            let randomT2 = dataPool[type][Math.floor(Math.random() * dataPool[type].length)];
            
            box1.innerHTML = `<div class="team-name">${randomT1['Nhóm số']}</div><div class="team-members">${randomT1['Thành viên']}</div>`;
            box2.innerHTML = `<div class="team-name">${randomT2['Nhóm số']}</div><div class="team-members">${randomT2['Thành viên']}</div>`;
            
            spinCount++;
            
            if (spinCount >= maxSpins) {
                clearInterval(spinInterval);
                
                let index1 = Math.floor(Math.random() * dataPool[type].length);
                let team1 = dataPool[type].splice(index1, 1)[0];
                
                let index2 = Math.floor(Math.random() * dataPool[type].length);
                let team2 = dataPool[type].splice(index2, 1)[0];
                
                box1.innerHTML = `<div class="team-name">${team1['Nhóm số']}</div><div class="team-members">${team1['Thành viên']}</div>`;
                box2.innerHTML = `<div class="team-name">${team2['Nhóm số']}</div><div class="team-members">${team2['Thành viên']}</div>`;
                
                targetWrapper.classList.add('highlight-match');
                
                currentMatchIndex[type]++;
                isDrawing = false;
            }
        }, 80); 
    }
</script>
</body>
</html>
